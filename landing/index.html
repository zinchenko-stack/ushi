<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ushi — запись звука и экрана на Mac</title>
  <meta name="description" content="Приложение, которое записывает звук и экран для важного, и превращает это в текст с удобным поиском.">
  <meta property="og:title" content="Ushi — записывай важное">
  <meta property="og:description" content="Записывает звук и экран, превращает в текст с удобным поиском.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f5f4;
      --container-primary: #ffffff;
      --element-primary: #101010;
      --element-secondary: #54585c;
      --element-tertiary: #abafb2;
      --element-accent: #2d53dd;
      --element-inverse: #ffffff;
      --gradient-from: #3460ff;
      --gradient-to: #1f3a99;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: "Onest", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--element-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 944px;
      gap: 20px;
    }

    .pill {
      background: var(--container-primary);
      border-radius: 24px;
      padding: 4px 16px 4px 12px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .pill .logo-square {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(to bottom, var(--gradient-from), var(--gradient-to));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .pill .logo-square svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .pill .brand {
      font-family: "Clash Display", "Onest", sans-serif;
      font-weight: 500;
      font-size: 28px;
      line-height: 40px;
      color: var(--element-accent);
      letter-spacing: -1.5px;
    }

    h1 {
      font-family: "Onest", sans-serif;
      font-weight: 500;
      font-size: 56px;
      line-height: 60px;
      letter-spacing: 0;
      text-align: center;
      padding-top: 20px;
      max-width: 800px;
    }

    h1 .muted {
      color: var(--element-tertiary);
      display: block;
    }

    h1 .accent {
      color: var(--element-primary);
      display: block;
    }

    .lead {
      font-family: "Onest", sans-serif;
      font-weight: 400;
      font-size: 18px;
      line-height: 32px;
      letter-spacing: -0.36px;
      color: var(--element-primary);
      text-align: center;
      max-width: 520px;
      margin-top: 20px;
    }

    .action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 28px;
      padding-top: 8px;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--element-accent);
      color: var(--element-inverse);
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 16px;
      font-family: "Onest", sans-serif;
      font-weight: 500;
      font-size: 15px;
      line-height: 22px;
      letter-spacing: -0.3px;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .cta:hover {
      background: #2647c4;
    }

    .cta:active {
      transform: scale(0.98);
    }

    .cta .apple-icon {
      width: 14px;
      height: 17px;
      display: block;
    }

    .caption {
      font-family: "Onest", sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 20px;
      letter-spacing: -0.14px;
      color: var(--element-secondary);
      text-align: center;
    }

    /* Hero entrance animation — fade + lift, staggered */
    @keyframes hero-rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pill, h1, .lead, .action {
      opacity: 0;
      animation: hero-rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .pill   { animation-delay: 0.05s; }
    h1      { animation-delay: 0.20s; }
    .lead   { animation-delay: 0.35s; }
    .action { animation-delay: 0.50s; }

    @media (prefers-reduced-motion: reduce) {
      .pill, h1, .lead, .action {
        animation: none;
        opacity: 1;
      }
    }

    /* Mobile */
    @media (max-width: 640px) {
      body {
        padding: 24px 20px;
      }
      h1 {
        font-size: 36px;
        line-height: 40px;
        letter-spacing: 0;
      }
      .pill .brand {
        font-size: 24px;
        line-height: 32px;
      }
      .pill .logo-square {
        width: 36px;
        height: 36px;
        border-radius: 10px;
      }
      .pill .logo-square svg {
        width: 18px;
        height: 18px;
      }
      .lead {
        font-size: 16px;
        line-height: 26px;
      }
    }
  </style>
</head>
